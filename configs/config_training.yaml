physics_model : '../../../../scratch/ROM_datasets_ale/ASTEC/saved_logs/' # this is the Path to a directory for the training on a given dataset
description : 'dataset_1_3_frozen_AE_quickly_to_1000_2/' #for a given dataset, one can train with different hyperparameters, hence the 'description'
data_path : '../../../../scratch/ROM_datasets_ale/ASTEC/made_datasets/only_loca_min_max/' #path of training and validation data
where_to_save_data : '../../../../scratch/ROM_datasets_ale/ASTEC/' #if dynamic_dataset_generation_during_training this is where data is saved, else it is where data for training is found
model: 'AE_NODE'
indeces_training_boundaries : [1,3] #[1,153,192,396, 398, 250]
indeces_validation_boundaries : [1,3] #[511, 582]
reinitialize_model_at_each_dataset_reshape: true
epochs: 10000 #maximum number of epochs
learning_rate: 0.001 #initial learning rate
learning_rate_frozen_AE : 0.001
gamma_lr: 0.999 # gamma of  tc.optim.lr_scheduler.ExponentialLR()
early_stopping: 250
all_on_gpu: false
dynamic_dataset_generation_during_training : true
time_windows  :  [13, 113, 203, 303, 403, 413, 423, 253, 603, 703, 803, 903, 1003]
batch_sizes  :  [256, 256, 256, 256, 256, 256, 256, 128, 128, 128, 32, 32, 16]
waiting_epochs_before_new_dataset_creation  :  [ 25, 25, 25, 25, 25, 25, 25, 25, 25, 25, 25, 25, 25]
number_of_workers: 8
checkpoint: false  # if true uses existing checkpoint
device : 'cuda:0' #device where to train
which_normalization: 'min_max' # min_max or mean_std
mixed_precision: true
compile: true 

#Data information if dynamic_dataset_generation_during_training is false
data_training_file_dinamic: 'data_training_normalized_t_W_' #use when modifying dynamically during training the dataset
data_validation_file_dinamic: 'data_validation_normalized_t_W_' #use when modifying dynamically during training the dataset
data_training_file : 'data_training_normalized_t_W_10_1_153_192_396_398_250.h5' #use when using a fixed dataset during training 
data_validation_file : 'data_validation_normalized_t_W_10_511_582.h5' #use when using a fixed dataset during training 
