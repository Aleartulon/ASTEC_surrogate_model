physics_model : '../../../../scratch/aalelonghi/ROM_datasets_ale/ASTEC/saved_logs/' # this is the Path to a directory for the training on a given dataset
description : 'dataset_1_153_192_396_398_500_no_regularization/' #for a given dataset, one can train with different hyperparameters, hence the 'description'
data_path : '../../../../scratch/aalelonghi/ROM_datasets_ale/ASTEC/made_datasets/only_loca_min_max/' #path of training and validation data
where_to_save_data : '../../../../scratch/aalelonghi/ROM_datasets_ale/ASTEC/' #if dynamic_dataset_generation_during_training this is where data is saved, else it is where data for training is found
model: 'AE_NODE'
indeces_training_boundaries : [1,153,192,396, 398, 500]
indeces_validation_boundaries : [511, 582]
reinitialize_model_at_each_dataset_reshape: true
epochs: 10000 #maximum number of epochs
learning_rate: 0.001 #initial learning rate
gamma_lr: 0.999 # gamma of  tc.optim.lr_scheduler.ExponentialLR()
early_stopping: 500
all_on_gpu: false
dynamic_dataset_generation_during_training : true
time_windows: [10, 50, 100, 150, 200, 250, 300, 350, 400, 450, 500, 550, 600, 650, 700, 750, 800, 850, 900, 950, 1000]

batch_sizes: [
    256, 256, 256, 256, 256, 256, 256, 256, 256, 256,
    256, 256, 256, 256, 256, 256, 256, 256, 256, 256,
    256]

waiting_epochs_before_new_dataset_creation: [
    10, 10, 10, 10, 10, 10, 10, 10, 10, 10,
    10, 10, 10, 10, 10, 10, 10, 10, 10, 10,
    10]
number_of_workers: 8
checkpoint: false  # if true uses existing checkpoint
device : 'cuda' #device where to train
which_normalization: 'min_max' # min_max or mean_std
mixed_precision: true

#Data information if dynamic_dataset_generation_during_training is false
data_training_file_dinamic: 'data_training_normalized_t_W_' #use when modifying dynamically during training the dataset
data_validation_file_dinamic: 'data_validation_normalized_t_W_' #use when modifying dynamically during training the dataset
data_training_file : 'data_training_normalized_t_W_10_1_153_192_396_398_500.h5' #use when using a fixed dataset during training 
data_validation_file : 'data_validation_normalized_t_W_10_511_582.h5' #use when using a fixed dataset during training 
