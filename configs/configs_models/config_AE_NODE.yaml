#Data information
data_training_file : 'data_training_normalized_t_W_200.h5'
data_validation_file : 'data_validation_normalized_t_W_200.h5'
#Training information

loss_coefficients: [1, 1, 0, 1]  # coefficients that are multiplied to the loss function terms, signaling the relative importance of each [AE, TF, AUTOREGRESSIVE, TIME_GENERALIZATION]
k: 4 # stage of the Runge-Kutta solver for the latent dynamics
AR_strength: 0.0005 #initial coeffient of the loss function term L_i^{A,k_2}
TBPP_dynamic: [1, 30, 40]  # [if 1 k_2 increases dynamically from k_2=1, number of epochs after which k_2 is increased by 1, max rvalue of k_2]
start_backprop: [1]  # Backpropagation strategy: look at function 'advance_from_ic' to see the 3 different options.
time_of_AE: 1 # number of initial epochs where only the AutoEncoder is trained, i.e., loss_coeff_TF_AR_together = [1, 0, 0, 0]. In parallel of this a linear warm-up of the learning rate is performed
time_only_TF : 0 #number of initial epochs after warm up where only TF and not AR approach is used
clipping: [0, 2.5] #[if 1 clipping is applied to f, maximum norm allowed to gradients]
is_coupled : [false, 'AE'] #if true the AutoEncoder (AE) is trained coupled with the NODE. if false, if 'AE' the AE is trained, if 'NODE' the NODE is trained.
loss_coeff_not_coupled : [0, 1, 1, 1] #if is_coupled[0] == false, adjust accordingly the loss coefficients
path_trained_AE : 'datasets/parametric_advection/Models/not_coupled' #if is_coupled : [false, 'NODE'], provide the path to the models weights of the AE

lambda_regularization: 0.0 #coefficients in front of the regularization term for the latent vector
auto_encoding:
  #Auto-Encoder scalar variables
  auto_encoder_scalar:
    input_dimension_encoder: 4
    output_dimension_encoder: 4 #dimension of the latent space
    list_of_neurons_encoder: [50,30]
    last_activation_encoder: false

    list_of_neurons_decoder: [50,30]
    last_activation_decoder: false

  #Auto-Encoder plenum
  auto_encoder_plenum:
    input_dimension_encoder: 18
    output_dimension_encoder: 5 #dimension of the latent space
    list_of_neurons_encoder: [50,30]
    last_activation_encoder: false

    list_of_neurons_decoder: [50,30]
    last_activation_decoder: false

  #Auto-Encoder boundaries
  auto_encoder_boundaries:
    input_dimension_encoder: 6
    output_dimension_encoder: 4 #dimension of the latent space
    list_of_neurons_encoder: [50,30]
    last_activation_encoder: false

    list_of_neurons_decoder: [50,30]
    last_activation_decoder: false

  #Auto-Encoder core
  auto_encoder_core:
    input_dimension_encoder: [4, 12, 3]  # first dimension is # of channels (one if the predicted solution is a scalar field), second is spatial dimensions per channel.
    kernel_encoder: [3,3,3] #kernels sizes of the Encoder
    filters_encoder: [8,16,32] #number of filters of the Encoder
    strides_encoder: [[1,1],[2,1],[2,1]] #strides of the Encoder
    output_dimension_encoder: 5 #dimension of the latent space
    last_activation_encoder: false

    kernel_decoder: [[3,3],[4,3],[4,3],[3]] #kernels sizes of the decoder
    filters_decoder: [16,8] #number of middle of the decoder. First one is filters_encoder[-1] and last one is input_dimension_encoder[-2]
    strides_decoder: [[1,1],[2,1],[2,1],[1,1]] #strides of the decoder
    last_activation_decoder: false

  #Auto-Encoder vessel
  auto_encoder_vessel:
    input_dimension_encoder: [18, 15, 5]  # first dimension is # of channels (one if the predicted solution is a scalar field), second is spatial dimensions per channel.
    kernel_encoder: [3,3,3] #kernels sizes of the Encoder
    filters_encoder: [16,16,16] #number of filters of the Encoder
    strides_encoder: [[1,1],[2,1],[2,1]] #strides of the Encoder
    output_dimension_encoder: 5 #dimension of the latent space
    last_activation_encoder: false

    kernel_decoder: [[3,3],[4,3],[3,3],[3]]  #kernels of the Decoder. For this, use one upsampling with kernel 4 and one with kernel 3 because of odd output
    filters_decoder: [16,16] #number of filters of the Decoder
    strides_decoder: [[1,1],[2,1],[2,1],[1,1]] #strides of the Decoder
    last_activation_decoder: false

  #Auto-Encoder faces
  auto_encoder_faces:
    input_dimension_encoder: [3, 16, 9]  # first dimension is # of channels (one if the predicted solution is a scalar field), second is spatial dimensions per channel.
    kernel_encoder: [3,3,3] #kernels sizes of the Encoder
    filters_encoder: [16,16,16] #number of filters of the Encoder
    strides_encoder: [[1,1],[2,2],[2,1]] #strides of the Encoder
    output_dimension_encoder: 7 #dimension of the latent space
    last_activation_encoder: false

    kernel_decoder: [[3,3],[4,3],[4,3],[3]]  #kernels sizes of the Encoder
    filters_decoder: [16,16] #number of filters of the Encoder
    strides_decoder: [[1,1],[2,2],[2,1],[1,1]] #strides of the Encoder
    last_activation_decoder: false

  # Final_reduction
  final_reduction_and_initial_increase:
    output_dimension_encoder: 20 # THIS IS THE ACTUAL FINAL REDUCED DIMENSION
    list_of_neurons_encoder: [50,30]
    last_activation_encoder: false

    list_of_neurons_decoder: [50,30]
    last_activation_decoder: false

#NODE
n_layers_f: 2 #number of hidden Dense layers which build up the function f
parameter_information: "concatenation" #how the parameter information is passed to f. either 'concatenation' or 'FiLM'
n_FiLM_conditioning : 1 #number of FiLM layers (if FiLM is chosen instead of concatenation). FiLM = 1 only applies to the latent vector
n_neurons_f: 50 #number of neurons of each layer of f
NODE: true

#Global
weight_decay:
  encoder: 0.0
  dfnn: 0.0
  decoder: 0.0
